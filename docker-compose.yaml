# make redis
# make postgres
# make limiter

networks:
  rl:
    driver: bridge
  
services:
  postgres:
    build: infrastructure/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - pg_data:/var/lib/postgresql
    networks:
      - rl
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_PASSWORD=root
  redis:
    image: redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rl
  rate_limiter:
    build: .
    env_file:
      - app.env
    networks:
      - rl
    ports:
      - "6000:6000"
      - "6003:6003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy


volumes:
  pg_data:
  redis_data:





